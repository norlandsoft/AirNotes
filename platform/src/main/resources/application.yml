server:
  port: 6600
  tomcat:
    connection-timeout: 0
    threads.max: 200
    max-connections: 10000
    accept-count: 100

spring:
  application:
    name: air-notes
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
