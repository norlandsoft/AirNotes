server:
  port: 6600

spring:
  application:
    name: air-notes
  datasource:
    url: jdbc:postgresql://localhost:5432/notes
    username: air
    password: Air@machine
    driver-class-name: org.postgresql.Driver
    type: org.apache.commons.dbcp2.BasicDataSource
    dbcp2:
      initial-size: 5
      max-total: 20
      max-idle: 10
      min-idle: 5
  jackson:
    default-property-inclusion: non_null
